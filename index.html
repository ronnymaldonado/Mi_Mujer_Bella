<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Anahí 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
background:#000;
font-family:'Poppins',sans-serif;
color:white;
}

/* estrellas */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
box-shadow:0 0 6px white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3;}
to{opacity:1;}
}

/* frase central */

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
}

.center h1{
font-family:'Dancing Script',cursive;
font-size:60px;
color:#ff9bd2;
text-shadow:0 0 20px pink;
}

/* frases flotantes */

.phrase{
position:absolute;
font-size:20px;
opacity:0;
animation:aparecer 10s infinite;
text-align:center;
max-width:250px;
}

@keyframes aparecer{
0%{opacity:0; transform:scale(0.8);}
20%{opacity:1;}
80%{opacity:1;}
100%{opacity:0; transform:scale(1.2);}
}

/* flores */

.flower{
position:absolute;
font-size:28px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* corazones cursor */

.heart{
position:absolute;
color:#ff4d88;
font-size:18px;
pointer-events:none;
animation:floatHeart 1.2s linear forwards;
}

@keyframes floatHeart{
0%{
opacity:1;
transform:translateY(0) scale(1);
}
100%{
opacity:0;
transform:translateY(-40px) scale(1.8);
}
}

/* estrella fugaz */

.shooting{
position:absolute;
width:3px;
height:3px;
background:white;
box-shadow:0 0 10px white;
animation:shoot 1.5s linear forwards;
}

@keyframes shoot{
0%{
transform:translate(0,0);
opacity:1;
}
100%{
transform:translate(700px,700px);
opacity:0;
}
}

</style>
</head>

<body>

<div class="center">
<h1>Para la mujer más linda, mi Anahí 💖</h1>
</div>

<script>

/* estrellas fondo */

for(let i=0;i<500;i++){
let star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";
star.style.animationDuration=1+Math.random()*3+"s";
document.body.appendChild(star);
}

/* frases */

const frases=[
"Eres más hermosa que todas las estrellas ✨",
"Tu sonrisa ilumina mi universo 💫",
"Cada estrella me recuerda a ti 💖",
"El mundo es más bonito desde que existes 🌸",
"Tu mirada es mi lugar favorito 🌙",
"Eres un sueño hecho realidad 💐",
"Si la belleza fuera tiempo, tú serías eternidad",
"Eres mi lugar favorito en el universo",
"Tu sonrisa es mi paz",
"Contigo todo es más bonito",
"Tu belleza ilumina mi vida",
"Siempre serás mi estrella favorita",
"Me encanta verte sonreír",
"Tu mirada es magia",
"Cada día contigo es especial"
];

frases.forEach((texto,i)=>{

let p=document.createElement("div");
p.className="phrase";
p.innerText=texto;

p.style.left=Math.random()*90+"vw";
p.style.top=Math.random()*90+"vh";

p.style.animationDelay=(i*2)+"s";

document.body.appendChild(p);

});

/* flores cayendo */

const flores=[
"🌹","🌷","🌻","🌸","💐","🌺","🌼","🪷"
];

function crearFlor(){

let f=document.createElement("div");

f.className="flower";

f.innerText=flores[Math.floor(Math.random()*flores.length)];

f.style.left=Math.random()*100+"vw";

f.style.animationDuration=4+Math.random()*4+"s";

document.body.appendChild(f);

setTimeout(()=>{f.remove()},8000);

}

setInterval(crearFlor,200);

/* corazones del cursor */

document.addEventListener("mousemove",function(e){

for(let i=0;i<2;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerText="💖";

heart.style.left=e.clientX+"px";

heart.style.top=e.clientY+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},1200);

}

});

/* estrellas fugaces */

function estrellaFugaz(){

let s=document.createElement("div");

s.className="shooting";

s.style.top=Math.random()*40+"vh";

s.style.left=Math.random()*40+"vw";

document.body.appendChild(s);

setTimeout(()=>{
s.remove();
},1500);

}

setInterval(estrellaFugaz,2500);

</script>

</body>
</html>
